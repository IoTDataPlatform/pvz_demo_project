services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  mqtt-emulator:
    build:
      context: ./mqtt-emulator
      dockerfile: Dockerfile
    container_name: mqtt-emulator
    restart: unless-stopped
    environment:
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
    depends_on:
      - mqtt-broker

  mqttx-web:
    image: emqx/mqttx-web:latest
    container_name: mqttx-web
    restart: unless-stopped
    ports:
      - "8086:80"

  pvz-backend:
    build:
      context: ../pvz-backend
      dockerfile: Dockerfile
    container_name: pvz-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATA_REDIS_HOST: host.docker.internal
      SPRING_DATA_REDIS_PORT: 6379

      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5430/db
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app

      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"
    ports:
      - "8085:8080"

  pvz-web:
    build:
      context: ../pvz-web
      dockerfile: Dockerfile
    container_name: pvz-web
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: "http://localhost:8085/api"
    ports:
      - "3000:80"
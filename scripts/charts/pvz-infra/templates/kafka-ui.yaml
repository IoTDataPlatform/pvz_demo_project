{{- if .Values.kafkaUi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pvz-infra.fullname" . }}-kafka-ui
  labels:
    {{- include "pvz-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka-ui
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: kafka-ui
  ports:
    - name: http
      port: {{ .Values.servicePorts.kafkaUi }}
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pvz-infra.fullname" . }}-kafka-ui
  labels:
    {{- include "pvz-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: kafka-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: {{ .Values.images.kafkaUi }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              hostPort: {{ .Values.servicePorts.kafkaUi }}
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: "local"
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "{{ include "pvz-infra.fullname" . }}-kafka:9092"
            - name: KAFKA_CLUSTERS_0_SCHEMAREGISTRY
              value: "http://{{ include "pvz-infra.fullname" . }}-schema-registry:8081"
            - name: KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME
              value: "connect-local"
            - name: KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS
              value: "http://{{ include "pvz-infra.fullname" . }}-connect:8083"
{{- end }}

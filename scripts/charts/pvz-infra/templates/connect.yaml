{{- if .Values.connect.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pvz-infra.fullname" . }}-connect
  labels:
    {{- include "pvz-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: connect
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: connect
  ports:
    - name: http
      port: {{ .Values.servicePorts.connect }}
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pvz-infra.fullname" . }}-connect
  labels:
    {{- include "pvz-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: connect
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: connect
    spec:
      containers:
        - name: connect
          image: {{ .Values.images.connect }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
              hostPort: {{ .Values.servicePorts.connect }}
          env:
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: "{{ include "pvz-infra.fullname" . }}-kafka:9092"
            - name: CONNECT_REST_PORT
              value: "8083"
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: "{{ include "pvz-infra.fullname" . }}-connect"
            - name: CONNECT_GROUP_ID
              value: {{ .Values.connect.groupId | quote }}
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: "__connect-configs"
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: "__connect-offsets"
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: "__connect-status"
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_KEY_CONVERTER
              value: "org.apache.kafka.connect.storage.StringConverter"
            - name: CONNECT_VALUE_CONVERTER
              value: "io.confluent.connect.avro.AvroConverter"
            - name: CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL
              value: "http://{{ include "pvz-infra.fullname" . }}-schema-registry:8081"
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "true"
            - name: CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_INTERNAL_KEY_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_INTERNAL_VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_INTERNAL_KEY_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_INTERNAL_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_PLUGIN_PATH
              value: {{ .Values.connect.pluginPath | quote }}
            - name: CONNECT_LOG4J_ROOT_LOGLEVEL
              value: "INFO"
          readinessProbe:
            httpGet:
              path: /connectors
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 5
          volumeMounts:
            - name: connect-plugins
              mountPath: /usr/share/confluent-hub-components
              readOnly: true
      volumes:
        - name: connect-plugins
          hostPath:
            path: {{ .Values.hostPaths.connectPlugins | quote }}
            type: Directory
{{- end }}
